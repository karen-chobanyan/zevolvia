# Zevolvia production Nginx config template
# Domain: zevolvia.com
#
# Routes:
# - /api/live/* -> Grafana (subpath mode)
# - /api/*      -> API
# - /*          -> Web app
#
# Prerequisites:
# - Set Grafana env:
#   GF_SERVER_ROOT_URL=https://zevolvia.com/api/live
#   GF_SERVER_SERVE_FROM_SUB_PATH=true
# - Ensure this server block is enabled in sites-enabled.

upstream zevolvia_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream zevolvia_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream zevolvia_grafana {
    server 127.0.0.1:3030;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name zevolvia.com www.zevolvia.com;
    return 301 https://zevolvia.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zevolvia.com;

    # Replace with your real cert paths.
    ssl_certificate /etc/letsencrypt/live/zevolvia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zevolvia.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Optional probe endpoint.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Normalize no-trailing-slash path.
    location = /api/live {
        return 301 /api/live/;
    }

    # Grafana must come before /api/.
    location ^~ /api/live/ {
        proxy_pass http://zevolvia_grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Prefix /api/live;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location ^~ /api/ {
        proxy_pass http://zevolvia_api;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location / {
        proxy_pass http://zevolvia_web;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
