apiVersion: 1

groups:
  - orgId: 1
    name: zevolvia-api-log-alerts
    folder: Zevolvia
    interval: 1m
    rules:
      - uid: zev_api_error_burst
        title: API Error Burst (5m)
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            queryType: instant
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(count_over_time({service="api", env="prod", level=~"error|fatal"}[5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 20
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        for: 2m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: Error/fatal API logs exceeded 20 events in 5 minutes.
        labels:
          severity: critical
          service: api
          signal: logs

      - uid: zev_auth_login_failures
        title: Auth Login Failures Burst (10m)
