apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-ops
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: email-ops
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
        continue: true
      - receiver: slack-ops
        matchers:
          - severity = warning
        repeat_interval: 4h
