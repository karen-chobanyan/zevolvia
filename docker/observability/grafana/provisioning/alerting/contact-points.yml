apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-ops
    receivers:
      - uid: slack_ops_receiver
        type: webhook
        settings:
          url: $SLACK_WEBHOOK_URL
          httpMethod: POST
          title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
          message: |
            **{{ .CommonLabels.alertname }}**
            Severity: {{ .CommonLabels.severity }}
            Service: {{ .CommonLabels.service }}

            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false

  - orgId: 1
    name: email-ops
    receivers:
      - uid: email_ops_receiver
        type: email
        settings:
          addresses: $ALERT_EMAIL_ADDRESSES
          singleEmail: true
        disableResolveMessage: false
