services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saloniq
    ports:
      - "5432:5432"
    volumes:
      - saloniq_db:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  deps:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      HUSKY: 0
      CI: 1
      npm_config_store_dir: /pnpm/store
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm install --force

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: saloniq
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 1d
      WEB_ORIGIN: http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: saloniq-files
      HUSKY: 0
      CI: 1
      npm_config_store_dir: /pnpm/store
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter saloniq-api start:dev

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: 1
      HUSKY: 0
      CI: 1
      npm_config_store_dir: /pnpm/store
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter saloniq-web dev

volumes:
  saloniq_db:
  minio_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  pnpm_store:
