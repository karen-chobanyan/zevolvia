name: zevolvia

x-node-build-dev: &node-build-dev
  context: .
  dockerfile: docker/Dockerfile
  target: dev

x-node-build-prod: &node-build-prod
  context: .
  dockerfile: docker/Dockerfile
  target: prod

x-node-dev-env: &node-dev-env
  NODE_ENV: development
  HUSKY: 0
  CI: 1
  npm_config_store_dir: /pnpm/store

x-node-prod-env: &node-prod-env
  NODE_ENV: production

x-dev-volumes: &dev-volumes
  - .:/app
  - node_modules:/app/node_modules
  - api_node_modules:/app/apps/api/node_modules
  - web_node_modules:/app/apps/web/node_modules
  - pnpm_store:/pnpm/store

services:
  db:
    image: pgvector/pgvector:pg16
    profiles:
      - dev
      - prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zevolvia
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - zevolvia_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles:
      - dev
      - prod
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    profiles:
      - dev
      - prod
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  deps:
    profiles:
      - dev
    build:
      <<: *node-build-dev
    environment:
      <<: *node-dev-env
    volumes: *dev-volumes
    command: pnpm install --force
    depends_on:
      db:
        condition: service_healthy

  api:
    profiles:
      - dev
    build:
      <<: *node-build-dev
      args:
        APP: api
    env_file:
      - ./apps/api/.env.docker
    environment:
      <<: *node-dev-env
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter zevolvia-api start:dev

  api-prod:
    profiles:
      - prod
    image: ${EVOLVIA_API_IMAGE:-zevolvia-api:local}
    build:
      <<: *node-build-prod
      args:
        APP: api
    env_file:
      - ./apps/api/.env.docker
    environment:
      <<: *node-prod-env
    ports:
      - "${API_PORT:-3001}:3001"
    command: node apps/api/dist/main.js
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web:
    profiles:
      - dev
    build:
      <<: *node-build-dev
      args:
        APP: web
    environment:
      <<: *node-dev-env
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter zevolvia-web dev

  web-prod:
    profiles:
      - prod
    image: ${EVOLVIA_WEB_IMAGE:-zevolvia-web:local}
    build:
      <<: *node-build-prod
      args:
        APP: web
    environment:
      <<: *node-prod-env
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"
    command: pnpm --filter zevolvia-web start
    depends_on:
      api-prod:
        condition: service_started

  loki:
    profiles:
      - observability
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./docker/observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test:
        ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M

  grafana:
    profiles:
      - observability
    image: grafana/grafana:10.4.2
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    env_file:
      - path: .env.observability
        required: false
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_LIVE_ALLOWED_ORIGINS: ${GF_LIVE_ALLOWED_ORIGINS:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-http://localhost:9/placeholder}
      ALERT_EMAIL_ADDRESSES: ${ALERT_EMAIL_ADDRESSES:-noop@localhost}
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-grafana@zevolvia.com}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Zevolvia Alerts}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    depends_on:
      loki:
        condition: service_healthy

  vector:
    profiles:
      - observability
    image: timberio/vector:0.39.0-debian
    command: ["--config", "/etc/vector/vector.yaml"]
    ports:
      - "127.0.0.1:${VECTOR_API_PORT:-8686}:8686"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/observability/vector.yaml:/etc/vector/vector.yaml:ro
      - vector_data:/vector-data-dir
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    depends_on:
      loki:
        condition: service_healthy

volumes:
  zevolvia_db:
  redis_data:
  minio_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  pnpm_store:
  loki_data:
  grafana_data:
  vector_data:
