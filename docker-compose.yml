name: evolvia

x-node-build-dev: &node-build-dev
  context: .
  dockerfile: docker/Dockerfile
  target: dev

x-node-build-prod: &node-build-prod
  context: .
  dockerfile: docker/Dockerfile
  target: prod

x-node-dev-env: &node-dev-env
  NODE_ENV: development
  HUSKY: 0
  CI: 1
  npm_config_store_dir: /pnpm/store

x-node-prod-env: &node-prod-env
  NODE_ENV: production

x-dev-volumes: &dev-volumes
  - .:/app
  - node_modules:/app/node_modules
  - api_node_modules:/app/apps/api/node_modules
  - web_node_modules:/app/apps/web/node_modules
  - pnpm_store:/pnpm/store

services:
  db:
    image: pgvector/pgvector:pg16
    profiles:
      - dev
      - prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zevolvia
    ports:
      - "5432:5432"
    volumes:
      - zevolvia_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles:
      - dev
      - prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    profiles:
      - dev
      - prod
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  deps:
    profiles:
      - dev
    build:
      <<: *node-build-dev
    environment:
      <<: *node-dev-env
    volumes: *dev-volumes
    command: pnpm install --force
    depends_on:
      db:
        condition: service_healthy

  api:
    profiles:
      - dev
    build:
      <<: *node-build-dev
      args:
        APP: api
    env_file:
      - ./apps/api/.env.docker
    environment:
      <<: *node-dev-env
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: zevolvia
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 1d
      WEB_ORIGIN: http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: zevolvia-files
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMBEDDING_MODEL: text-embedding-3-small
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter zevolvia-api start:dev

  api-prod:
    profiles:
      - prod
    image: ${EVOLVIA_API_IMAGE:-evolvia-api:local}
    build:
      <<: *node-build-prod
      args:
        APP: api
    env_file:
      - ./apps/api/.env.docker
    environment:
      <<: *node-prod-env
    ports:
      - "3001:3001"
    command: node apps/api/dist/main.js
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web:
    profiles:
      - dev
    build:
      <<: *node-build-dev
      args:
        APP: web
    environment:
      <<: *node-dev-env
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter zevolvia-web dev

  web-prod:
    profiles:
      - prod
    image: ${EVOLVIA_WEB_IMAGE:-evolvia-web:local}
    build:
      <<: *node-build-prod
      args:
        APP: web
    environment:
      <<: *node-prod-env
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    command: pnpm --filter zevolvia-web start
    depends_on:
      api-prod:
        condition: service_started

volumes:
  zevolvia_db:
  redis_data:
  minio_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  pnpm_store:
