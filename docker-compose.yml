services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saloniq
    ports:
      - "5432:5432"
    volumes:
      - saloniq_db:/var/lib/postgresql/data

  deps:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      HUSKY: 0
      CI: 1
      npm_config_store_dir: /pnpm/store
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm install --force

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: saloniq
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 15m
      WEB_ORIGIN: http://localhost:3000
      HUSKY: 0
      CI: 1
      npm_config_store_dir: /pnpm/store
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter saloniq-api start:dev

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: 1
      HUSKY: 0
      CI: 1
      npm_config_store_dir: /pnpm/store
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store
    command: pnpm --filter saloniq-web dev

volumes:
  saloniq_db:
  node_modules:
  api_node_modules:
  web_node_modules:
  pnpm_store:
