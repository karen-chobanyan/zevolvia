image: docker:24.0.7

services:
  - name: docker:24.0.7-dind
    command: ["--mtu=1460"]

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"

stages:
  - build
  - deploy

build_and_push:
  stage: build
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -f docker/Dockerfile --target prod --build-arg APP=api -t "$CI_REGISTRY_IMAGE/api:latest" .
    - docker push "$CI_REGISTRY_IMAGE/api:latest"
    - docker build -f docker/Dockerfile --target prod --build-arg APP=web --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" -t "$CI_REGISTRY_IMAGE/web:latest" .
    - docker push "$CI_REGISTRY_IMAGE/web:latest"

deploy_server:
  stage: deploy
  image: alpine:3.20
  needs:
    - build_and_push
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  before_script:
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$DEPLOY_PATH"
    - test -n "$DEPLOY_SSH_PRIVATE_KEY"
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if printf '%s' "$DEPLOY_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519 2>/dev/null; then
        echo "Loaded deploy key from base64 value"
      else
        printf '%b' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
        echo "Loaded deploy key from raw value"
      fi
      if ! grep -q "PRIVATE KEY" ~/.ssh/id_ed25519; then
        echo "DEPLOY_SSH_PRIVATE_KEY is invalid. Provide raw key text or base64-encoded key." >&2
        exit 1
      fi
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - >
      rsync -az --delete
      -e "ssh -i ~/.ssh/id_ed25519 -p ${DEPLOY_SSH_PORT:-22} -o StrictHostKeyChecking=yes"
      docker-compose.yml compose.prod.images.yml Makefile
      "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - |
      ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_SSH_PORT:-22}" -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" \
        /bin/sh -s -- "$DEPLOY_PATH" "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" <<'EOF'
      set -eu
      DEPLOY_PATH="$1"
      CI_REGISTRY="$2"
      CI_REGISTRY_USER="$3"
      CI_REGISTRY_PASSWORD="$4"
      cd "$DEPLOY_PATH"
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      make prod-obs
      EOF
