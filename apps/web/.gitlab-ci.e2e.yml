stages:
  - test

variables:
  BASE_URL: "http://127.0.0.1:3000"
  NEXT_PUBLIC_API_URL: "http://127.0.0.1:4010/api"

playwright_e2e_web:
  stage: test
  image: mcr.microsoft.com/playwright:v1.51.1-jammy
  before_script:
    - npm ci
  script:
    - npm run test:e2e
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - playwright-report/
      - test-results/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/web/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - apps/web/**/*
